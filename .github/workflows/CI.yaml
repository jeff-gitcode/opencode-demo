name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # WeatherAPI (.NET)
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore WeatherAPI
        run: dotnet restore WeatherAPI/JwtAuthApi.csproj

      - name: Build WeatherAPI
        run: dotnet build WeatherAPI/JwtAuthApi.csproj --configuration Release --no-restore

      - name: Run WeatherAPI Tests
        run: dotnet test WeatherAPI.Tests/WeatherAPI.Tests.csproj --configuration Release --no-build

      # Next-Example (Node.js)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: next-example/package-lock.json

      - name: Install Next-Example dependencies
        run: npm ci
        working-directory: next-example

      - name: Build Next-Example
        run: npm run build
        working-directory: next-example

      - name: Lint Next-Example
        run: npm run lint
        working-directory: next-example
