services:
  weatherapi:
    build:
      context: .
      dockerfile: WeatherAPI/Dockerfile
    container_name: weatherapi
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - Jwt__Key=ThisIsA32CharacterKeyForJWT12345678!
      - Jwt__Issuer=WeatherAPI
      - Jwt__Audience=WeatherAPI
    networks:
      - app-network

  next-example:
    build:
      context: .
      dockerfile: next-example/Dockerfile
    container_name: next-example
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    networks:
      - app-network

  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DOZZLE_HOST=0.0.0.0
      - DOZZLE_PORT=8080
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
